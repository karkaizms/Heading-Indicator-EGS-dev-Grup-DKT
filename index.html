<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHI Simulator | Antigravity</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --accent-orange: #ff8c00;
            --text-white: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Enstrüman Tasarımı */
        .instrument-outer {
            width: 300px;
            height: 300px;
            border: 8px solid #333;
            border-radius: 50%;
            position: relative;
            background: #000;
            margin: 20px auto;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .compass-card {
            width: 100%;
            height: 100%;
            position: absolute;
            background-image: url('https://i.imgur.com/8X5f3lE.png'); /* Örnek pusula kartı görseli veya SVG */
            background-size: contain;
            transition: transform 0.1s ease-out;
        }

        /* SVG ile Dinamik Pusula Çizimi (Görsel yüklenmezse diye alternatif) */
        .compass-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
        }

        .lubber-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 30px;
            background: white;
            transform: translateX(-50%);
            z-index: 10;
        }

        .aircraft-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            z-index: 5;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        /* Kontrol Paneli */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type=range] {
            width: 300px;
            accent-color: var(--accent-orange);
        }

        .telemetry {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }

        .value {
            color: var(--accent-orange);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>VIRTUAL HEADING INDICATOR</h2>
        <p>Antigravity Project v1.0</p>

        <div class="instrument-outer">
            <div class="lubber-line"></div>
            <!-- Uçak Simgesi -->
            <svg class="aircraft-icon" viewBox="0 0 24 24" fill="white">
                <path d="M21,16L21,14L13,9L13,3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5L10,9L2,14L2,16L10,13.5L10,19L8,20.5L8,22L11.5,21L15,22L15,20.5L13,19L13,13.5L21,16Z" />
            </svg>
            
            <!-- Pusula Kartı (Basit Temsili) -->
            <div id="compass" class="compass-card" style="display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#444" stroke-width="0.5"/>
                    <text x="50" y="15" fill="white" font-size="8" text-anchor="middle">N</text>
                    <text x="85" y="52" fill="white" font-size="8" text-anchor="middle">E</text>
                    <text x="50" y="92" fill="white" font-size="8" text-anchor="middle">S</text>
                    <text x="15" y="52" fill="white" font-size="8" text-anchor="middle">W</text>
                    <!-- Derece işaretleri kodla da çoğaltılabilir -->
                </svg>
            </div>
        </div>

        <div class="controls">
            <label>Heading Ayarla (Manual Input)</label>
            <input type="range" id="headingSlider" min="0" max="360" value="0">
            
            <div class="telemetry">
                <div>Heading: <span id="headingVal" class="value">000°</span></div>
                <div>Status: <span class="value" style="color: #4caf50;">ACTIVE</span></div>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('headingSlider');
        const compass = document.getElementById('compass');
        const headingDisplay = document.getElementById('headingVal');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            
            // Pusula kartını ters yönde döndürerek uçağın yönünü simüle et
            compass.style.transform = `rotate(${-val}deg)`;
            
            // Değeri 3 haneli formatta yazdır (090, 005 vb.)
            headingDisplay.innerText = `${val.padStart(3, '0')}°`;
        });
    </script>
</body>
</html>
